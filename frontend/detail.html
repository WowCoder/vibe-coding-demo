<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>对话详情 — Talk2Code</title><script src="js/security.js"></script><style>:root{--bg:oklch(97% 0.018 70);--surface:oklch(99% 0.008 70);--fg:oklch(22% 0.02 50);--muted:oklch(50% 0.018 50);--border:oklch(90% 0.014 70);--accent:oklch(64% 0.13 28);--accent-soft:oklch(88% 0.04 38);--font-display:'Tiempos Headline','Newsreader','Iowan Old Style',Georgia,serif;--font-body:'Söhne',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;--dark-bg:oklch(22% 0.015 60);--dark-surface:oklch(18% 0.012 60);--dark-border:oklch(32% 0.012 60);--dark-fg:oklch(90% 0.005 70);--dark-muted:oklch(58% 0.01 60);--dark-hover:oklch(28% 0.012 60)}*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--font-body);background:var(--bg);color:var(--fg);height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;backdrop-filter:blur(12px);background:oklch(99% 0.008 70 / 88%)}.nav-left{display:flex;align-items:center;gap:12px;min-width:0}.nav-back{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;border:1px solid var(--border);background:none;transition:color 0.15s,background 0.15s;flex-shrink:0}.nav-back:hover{color:var(--fg);background:var(--bg)}.nav-title{font-family:var(--font-display);font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--fg)}.nav-right{display:flex;align-items:center;gap:12px}.nav-status{font-size:12px;color:var(--muted)}.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;background:var(--accent);animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}.nav-avatar{width:30px;height:30px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}.split{flex:1;display:flex;min-height:0;gap:1px;background:var(--border)}.dialogue{flex:0 0 40%;display:flex;flex-direction:column;background:var(--surface);min-width:0}.dialogue-header{padding:12px 20px;border-bottom:1px solid var(--border);font-size:14px;font-weight:600;color:var(--fg);flex-shrink:0}.dialogue-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}.dialogue-body::-webkit-scrollbar{width:6px}.dialogue-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}.msg{max-width:88%}.msg.user{align-self:flex-end}.msg.agent{align-self:flex-start}.msg .bubble{padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.6}.msg.user .bubble{background:var(--accent);color:#fff;border-bottom-right-radius:6px}.msg.agent .bubble{background:var(--bg);border:1px solid var(--border);border-bottom-left-radius:6px;color:var(--fg)}.msg .agent-name{font-size:11px;font-weight:600;color:var(--accent);margin-bottom:4px;letter-spacing:.02em}.msg .time{font-size:11px;color:var(--muted);margin-top:4px}.msg.system{align-self:center;font-size:12px;color:var(--muted);background:var(--bg);padding:6px 16px;border-radius:100px}.dialogue-input{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;background:var(--surface)}.dialogue-input input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:12px;font-size:14px;font-family:var(--font-body);color:var(--fg);background:var(--bg);outline:none;transition:border-color 0.2s}.dialogue-input input:focus{border-color:var(--accent)}.dialogue-input input::placeholder{color:oklch(65% 0.01 70)}.btn-send{padding:10px 20px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:14px;font-weight:600;font-family:var(--font-body);cursor:pointer;transition:background 0.2s;white-space:nowrap}.btn-send:hover{background:oklch(58% 0.13 28)}.btn-send:disabled{opacity:.4;cursor:not-allowed}.right-panel{flex:1;display:flex;flex-direction:column;background:var(--dark-bg);min-width:0}.panel-tabbar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--dark-surface);border-bottom:1px solid var(--dark-border);flex-shrink:0}.panel-tabs{display:flex;gap:0}.panel-tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--dark-muted);cursor:pointer;border:none;background:none;font-family:var(--font-body);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 0.15s}.panel-tab:hover{color:var(--dark-fg)}.panel-tab.active{color:#fff;border-bottom-color:var(--accent)}.btn-download{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;font-family:var(--font-body);color:#fff;cursor:pointer;border:none;background:var(--accent);transition:background 0.2s}.btn-download:hover{background:oklch(58% 0.13 28)}.progress{height:3px;background:var(--dark-border);flex-shrink:0}.progress-fill{height:100%;background:var(--accent);width:0;transition:width 0.3s}.view{flex:1;overflow:hidden;display:none}.view.active{display:flex;flex-direction:column}.preview-toolbar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--dark-surface);border-bottom:1px solid var(--dark-border);flex-shrink:0}.device-btn{padding:5px 12px;border-radius:6px;font-size:12px;font-family:var(--font-body);color:var(--dark-muted);cursor:pointer;border:1px solid var(--dark-border);background:transparent;transition:color 0.15s,border-color 0.15s}.device-btn:hover{color:var(--dark-fg);border-color:oklch(45% 0.012 60)}.device-btn.active{color:#fff;background:oklch(30% 0.012 60);border-color:oklch(45% 0.012 60)}.preview-canvas{flex:1;background:#fff;display:flex;align-items:center;justify-content:center;overflow:auto}.code-layout{display:flex;flex:1;min-height:0}.file-tree{width:200px;flex-shrink:0;background:var(--dark-surface);border-right:1px solid var(--dark-border);display:flex;flex-direction:column;overflow:hidden}.file-tree-header{padding:10px 14px;font-size:11px;font-weight:600;letter-spacing:.03em;color:var(--dark-muted);text-transform:uppercase;border-bottom:1px solid var(--dark-border);flex-shrink:0}.file-tree-body{flex:1;overflow-y:auto;padding:6px 0}.file-tree-body::-webkit-scrollbar{width:4px}.file-tree-body::-webkit-scrollbar-thumb{background:oklch(35% 0.012 60);border-radius:2px}.tree-file{display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:13px;color:var(--dark-muted);cursor:pointer;transition:color 0.15s,background 0.15s}.tree-file:hover{color:var(--dark-fg);background:var(--dark-hover)}.tree-file.active{color:#fff;background:var(--dark-hover)}.tree-file-icon{width:16px;height:16px;border-radius:3px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}.tree-file-icon.html{background:oklch(50% 0.12 35);color:#fff}.tree-file-icon.css{background:oklch(50% 0.12 260);color:#fff}.tree-file-icon.js{background:oklch(50% 0.12 100);color:#000}.code-main{flex:1;display:flex;flex-direction:column;min-width:0}.code-filename{padding:8px 16px;font-size:12px;color:var(--dark-muted);background:var(--dark-surface);border-bottom:1px solid var(--dark-border);flex-shrink:0;display:flex;align-items:center;gap:8px}.code-editor{flex:1;overflow-y:auto;padding:16px 20px;font-family:'JetBrains Mono',ui-monospace,'IBM Plex Mono',Menlo,monospace;font-size:13px;line-height:1.7;white-space:pre-wrap;color:var(--dark-fg);background:var(--dark-bg);outline:none;tab-size:2}.code-editor::-webkit-scrollbar{width:8px;height:8px}.code-editor::-webkit-scrollbar-thumb{background:oklch(38% 0.012 60);border-radius:4px}.code-editor:focus{border:1px solid var(--accent)}.question-form-card{background:var(--accent-soft);border-radius:12px;padding:16px;margin:8px 0}.question-form-card .qf-title{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:12px}.question-form-card .qf-item{margin-bottom:10px}.question-form-card .qf-label{font-size:12px;color:var(--fg);margin-bottom:4px}.question-form-card .qf-options{display:flex;flex-wrap:wrap;gap:6px}.question-form-card .qf-radio{border:1px solid var(--border);padding:5px 12px;border-radius:100px;font-size:12px;cursor:pointer;background:var(--surface);color:var(--muted);transition:all 0.15s}.question-form-card .qf-radio.selected{background:var(--accent);color:#fff;border-color:var(--accent)}.question-form-card .qf-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font-body)}.question-form-card .qf-submit{padding:8px 20px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px}.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s}.toast.show{opacity:1}.toast.success{background:oklch(93% 0.05 155);color:oklch(38% 0.1 155)}.toast.error{background:oklch(94% 0.03 20);color:oklch(42% 0.15 20)}</style></head><body><nav class="nav"><div class="nav-left"><a href="history.html" class="nav-back"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 19l-7-7 7-7"/></svg></a><span class="nav-title" id="navTitle">加载中…</span></div><div class="nav-right"><span class="nav-status" id="navStatus">准备中</span><span class="nav-avatar" id="navAvatar">U</span></div></nav><div class="split"><div class="dialogue"><div class="dialogue-header">AI 对话</div><div class="dialogue-body" id="dialogueMessages"></div><div class="dialogue-input"><input type="text" id="chatInput" placeholder="输入消息继续对话…" disabled><button class="btn-send" id="sendBtn" disabled>发送</button></div></div><div class="right-panel"><div class="progress"><div class="progress-fill" id="progressFill"></div></div><div class="panel-tabbar"><div class="panel-tabs"><button class="panel-tab active" data-view="preview">预览</button><button class="panel-tab" data-view="code">代码</button></div><button class="btn-download" id="downloadBtn"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>代码下载</button></div><div class="view active" id="view-preview"><div class="preview-toolbar"><button class="device-btn active" data-device="desktop">桌面端</button><button class="device-btn" data-device="tablet">平板</button><button class="device-btn" data-device="mobile">手机</button></div><div class="preview-canvas" id="previewCanvas"></div></div><div class="view" id="view-code"><div class="code-layout"><div class="file-tree"><div class="file-tree-header">工作区</div><div class="file-tree-body" id="fileTree"></div></div><div class="code-main"><div class="code-filename" id="codeFilename">index.html</div><pre class="code-editor" id="codeEditor" contenteditable="true"></pre></div></div></div></div></div><div class="toast" id="toast"></div><script>const API_BASE=window.location.origin;const token=localStorage.getItem('token');if(!token)window.location.href='login.html';let username='用户';try{const p=JSON.parse(atob(token.split('.')[1]));username=p.sub||'用户';document.getElementById('navAvatar').textContent=username[0].toUpperCase()}catch(e){}const urlParams=new URLSearchParams(window.location.search);const requirementId=urlParams.get('id');if(!requirementId||requirementId==='undefined'||requirementId==='null')window.location.href='index.html';let codeFiles={};let dialogueMessages=[];let isGenerating=false;let sseEventSource=null;let activeFile='index.html';const toastEl=document.getElementById('toast');function showToast(msg,type){toastEl.textContent=msg;toastEl.className='toast '+type+' show';setTimeout(()=>toastEl.classList.remove('show'),3000)}function getToken(){return token}function closeSSE(){if(sseEventSource){sseEventSource.close();sseEventSource=null}}function resetProgress(){document.getElementById('progressFill').style.width='0%'}</script><script>let previewTabActive=true;let codeEditor=document.getElementById('codeEditor');let codeFilename=document.getElementById('codeFilename');let fileTreeEl=document.getElementById('fileTree');function switchTab(view){const btns=document.querySelectorAll('.panel-tab');btns.forEach(t=>t.classList.remove('active'));const target=document.querySelector('.panel-tab[data-view="'+view+'"]');if(target)target.classList.add('active');document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('view-'+view).classList.add('active');if(view==='code')renderFileTree()}document.querySelectorAll('.panel-tab').forEach(t=>t.addEventListener('click',function(){switchTab(this.dataset.view)}));document.querySelectorAll('.device-btn').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('.device-btn').forEach(x=>x.classList.remove('active'));this.classList.add('active');refreshPreview()}));function renderFileTree(){if(!Object.keys(codeFiles).length){fileTreeEl.innerHTML='<div style="padding:12px 14px;font-size:12px;color:var(--dark-muted)">暂无文件</div>';return}const exts={html:'H',css:'C',js:'J'};fileTreeEl.innerHTML=Object.keys(codeFiles).map(f=>{const ext=f.split('.').pop();const cls=exts[ext]||'H';return`<div class="tree-file${f===activeFile?' active':''}" data-file="${f}" onclick="switchFile('${f}',this)"><span class="tree-file-icon ${ext}">${cls}</span>${f}</div>`}).join('')}window.switchFile=function(filename,el){activeFile=filename;document.querySelectorAll('.tree-file').forEach(f=>f.classList.remove('active'));if(el)el.classList.add('active');codeFilename.textContent=filename;codeEditor.textContent=codeFiles[filename]||'';renderFileTree()};function appendCode(filename,content){codeFiles[filename]=content;if(!activeFile||activeFile===filename){switchFile(filename,document.querySelector(`[data-file="${filename}"]`))}renderFileTree()}codeEditor.addEventListener('input',function(){clearTimeout(codeEditor._saveTimeout);codeEditor._saveTimeout=setTimeout(()=>{codeFiles[activeFile]=codeEditor.textContent;saveCodeFile(activeFile,codeEditor.textContent)},1000)});async function saveCodeFile(filename,content){try{await fetch(API_BASE+'/api/requirements/'+requirementId+'/code',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({filename,content})})}catch(e){}}function buildPreviewHTML(){const html=codeFiles['index.html']||'';const css=codeFiles['style.css']||'';const js=codeFiles['script.js']||'';if(!html&&!css&&!js)return'';return`<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com;script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com;style-src 'self' 'unsafe-inline';img-src 'self' data: https:"><title>Preview</title><style>${css}</style></head><body>${html}<script>${js}<\/script></body></html>`}function refreshPreview(){const canvas=document.getElementById('previewCanvas');const activeDevice=document.querySelector('.device-btn.active');const device=activeDevice?activeDevice.dataset.device:'desktop';const html=buildPreviewHTML();if(!html){canvas.innerHTML='<div style="color:#999;text-align:center;padding:40px">等待代码生成…</div>';return}const blob=new Blob([html],{type:'text/html'});const url=URL.createObjectURL(blob);const w={mobile:375,tablet:768,desktop:1024}[device];canvas.innerHTML=`<iframe src="${url}" sandbox="allow-scripts allow-same-origin allow-forms" style="width:${w}px;max-width:100%;height:100%;border:none;background:#fff"></iframe>`}</script><script>function addDialogueMessage(msg){const exists=dialogueMessages.some(m=>m.content===msg.content&&m.role===msg.role);if(exists)return;dialogueMessages.push(msg);renderDialogue()}function renderDialogue(){const body=document.getElementById('dialogueMessages');body.innerHTML=dialogueMessages.map(m=>{if(m.role==='system')return`<div class="msg system">${SecurityUtils.escapeHtml(m.content)}</div>`;if(m.role==='user')return`<div class="msg user"><div class="bubble">${SecurityUtils.escapeHtml(m.content)}</div></div>`;const name=m.name||'AI';return`<div class="msg agent"><div class="agent-name">${SecurityUtils.escapeHtml(name)}</div><div class="bubble">${SecurityUtils.escapeHtml(m.content)}</div></div>`}).join('');body.scrollTop=body.scrollHeight}function updateProgress(agent,progress){const fill=document.getElementById('progressFill');fill.style.width=progress+'%';document.getElementById('navStatus').innerHTML='<span class="status-dot"></span>'+agent+' 工作中…'}function generationComplete(){document.getElementById('progressFill').style.width='100%';document.getElementById('navStatus').textContent='已完成';document.getElementById('sendBtn').disabled=false;document.getElementById('chatInput').disabled=false;isGenerating=false;refreshPreview();renderFileTree()}function renderQuestionForm(formData){const body=document.getElementById('dialogueMessages');const wrapper=document.createElement('div');let html='<div class="question-form-card" id="questionForm"><div class="qf-title">补充信息，让 AI 更好地理解你的需求</div>';formData.questions.forEach(q=>{html+=`<div class="qf-item"><div class="qf-label">${SecurityUtils.escapeHtml(q.label)}</div>`;if(q.type==='radio'&&q.options){html+='<div class="qf-options">';q.options.forEach((opt,i)=>{html+=`<span class="qf-radio${i===0?' selected':''}" data-qid="${q.id}" data-value="${opt}" onclick="selectQFRadio(this)">${SecurityUtils.escapeHtml(opt)}</span>`});html+='</div>'}else{html+=`<input type="text" class="qf-input" data-qid="${q.id}" placeholder="请输入…">`}html+='</div>'});html+='<button class="qf-submit" onclick="submitQuestionForm()">提交补充信息</button></div>';wrapper.innerHTML=html;body.appendChild(wrapper);body.scrollTop=body.scrollHeight}window.selectQFRadio=function(el){const qid=el.dataset.qid;el.parentElement.querySelectorAll('.qf-radio').forEach(r=>r.classList.remove('selected'));el.classList.add('selected')};async function submitQuestionForm(){const form=document.getElementById('questionForm');if(!form)return;const answers={};form.querySelectorAll('.qf-radio.selected').forEach(r=>answers[r.dataset.qid]=r.dataset.value);form.querySelectorAll('.qf-input').forEach(i=>{if(i.value.trim())answers[i.dataset.qid]=i.value.trim()});form.style.opacity='0.4';try{const r=await fetch(API_BASE+'/api/requirements/'+requirementId+'/clarify',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({answers})});if(!r.ok)throw new Error('请求失败');closeSSE();resetProgress();codeFiles={};activeFile='index.html';dialogueMessages=[];document.getElementById('dialogueMessages').innerHTML='';document.getElementById('codeEditor').textContent='';connectSSE()}catch(e){console.error(e);showToast('提交失败','error');form.style.opacity='1'}}</script><script>function connectSSE(){sseEventSource=new EventSource(API_BASE+'/api/sse/'+requirementId);sseEventSource.addEventListener('connected',e=>console.log('SSE connected'));sseEventSource.addEventListener('dialogue',e=>{addDialogueMessage(JSON.parse(e.data))});sseEventSource.addEventListener('code',e=>{const d=JSON.parse(e.data);appendCode(d.filename,d.content)});sseEventSource.addEventListener('progress',e=>{const d=JSON.parse(e.data);updateProgress(d.current_agent,d.progress)});sseEventSource.addEventListener('question-form',e=>{renderQuestionForm(JSON.parse(e.data))});sseEventSource.addEventListener('complete',e=>{generationComplete()});sseEventSource.onerror=e=>console.error('SSE error')};async function loadRequirement(){try{const r=await fetch(API_BASE+'/api/requirements/'+requirementId,{headers:{'Authorization':'Bearer '+token}});if(!r.ok)throw new Error('Failed');const d=await r.json();const req=d.requirement||d;document.getElementById('navTitle').textContent=req.title||req.content||'未命名';if(req.dialogue_history&&req.dialogue_history.length){dialogueMessages=req.dialogue_history;renderDialogue()}if(req.code_files&&req.code_files.length){req.code_files.forEach(f=>{codeFiles[f.filename]=f.content});refreshPreview()}if(req.status==='finished'){generationComplete()}else if(req.status==='processing'){connectSSE();document.getElementById('navStatus').innerHTML='<span class="status-dot"></span>处理中';isGenerating=true}else{connectSSE()}}catch(e){console.error('Load failed:',e);showToast('加载失败','error')}finally{refreshPreview()}}document.getElementById('sendBtn').addEventListener('click',async()=>{const input=document.getElementById('chatInput');const msg=input.value.trim();if(!msg)return;addDialogueMessage({role:'user',name:'用户',content:msg});input.value='';document.getElementById('sendBtn').disabled=true;try{const r=await fetch(API_BASE+'/api/requirements/'+requirementId+'/chat',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({message:msg})});const d=await r.json();if(d.message)addDialogueMessage({role:'agent',name:'AI',content:d.message});if(d.code_files){d.code_files.forEach(f=>{codeFiles[f.filename]=f.content});renderFileTree();refreshPreview()}}catch(e){showToast('发送失败','error')}finally{document.getElementById('sendBtn').disabled=false}});document.getElementById('chatInput').addEventListener('keypress',e=>{if(e.key==='Enter')document.getElementById('sendBtn').click()});</script><script>loadRequirement();if(localStorage.getItem('previewWidth')){const w=localStorage.getItem('previewWidth');const btn=document.querySelector('[data-device="'+w+'"]');if(btn)btn.click()}</script></body></htm
