<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talk2Code — 用自然语言创造应用</title>
<script src="js/security.js"></script>
<style>
  :root {
    --bg:      oklch(97% 0.018 70);
    --surface: oklch(99% 0.008 70);
    --fg:      oklch(22% 0.02 50);
    --muted:   oklch(50% 0.018 50);
    --border:  oklch(90% 0.014 70);
    --accent:  oklch(64% 0.13 28);
    --accent-soft: oklch(88% 0.04 38);
    --font-display: 'Tiempos Headline', 'Newsreader', 'Iowan Old Style', Georgia, serif;
    --font-body: 'Söhne', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-body); background: var(--bg); color: var(--fg);
    min-height: 100vh; -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column;
  }
  .nav {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 32px; height: 60px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px); background: oklch(99% 0.008 70 / 85%);
  }
  .nav-brand {
    font-family: var(--font-display); font-size: 22px; font-weight: 600;
    color: var(--fg); text-decoration: none; letter-spacing: -0.01em;
  }
  .nav-brand span { color: var(--accent); }
  .nav-links { display: flex; align-items: center; gap: 8px; }
  .nav-link {
    padding: 8px 16px; border-radius: 10px; font-size: 14px; font-weight: 500;
    color: var(--muted); text-decoration: none; transition: color 0.15s, background 0.15s;
  }
  .nav-link:hover { color: var(--fg); background: var(--bg); }
  .nav-user { display: flex; align-items: center; gap: 12px; }
  .nav-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--accent-soft); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
  }
  .nav-username { font-size: 14px; color: var(--fg); font-weight: 500; }
  .btn-logout {
    padding: 8px 16px; border-radius: 10px; font-size: 14px; font-weight: 500;
    color: var(--muted); cursor: pointer; border: none; background: none;
    font-family: var(--font-body); transition: color 0.15s;
  }
  .btn-logout:hover { color: oklch(42% 0.15 20); }

  .main {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 60px 24px; max-width: 720px;
    margin: 0 auto; width: 100%;
  }
  .hero { text-align: center; margin-bottom: 48px; }
  .hero h1 {
    font-family: var(--font-display); font-size: clamp(36px, 5vw, 52px);
    font-weight: 600; color: var(--fg); letter-spacing: -0.02em; line-height: 1.15;
  }
  .hero h1 mark { background: none; color: var(--accent); }
  .hero p {
    font-size: 17px; color: var(--muted); margin-top: 12px;
    max-width: 460px; margin-left: auto; margin-right: auto; line-height: 1.6;
  }
  .input-card {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 32px; position: relative; overflow: hidden;
  }
  .input-card::before {
    content: ''; position: absolute; inset: 0; border-radius: 20px;
    background: radial-gradient(ellipse 80% 50% at 50% 100%, oklch(90% 0.04 45 / 18%), transparent);
    pointer-events: none;
  }
  .input-card textarea {
    width: 100%; min-height: 140px; padding: 16px; border: 1px solid var(--border);
    border-radius: 14px; font-size: 16px; font-family: var(--font-body);
    color: var(--fg); background: var(--bg); resize: vertical; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s; line-height: 1.6; position: relative;
  }
  .input-card textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px oklch(64% 0.13 28 / 10%); }
  .input-card textarea::placeholder { color: oklch(65% 0.01 70); }
  .input-card .actions {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 20px; position: relative;
  }
  .input-card .hint { font-size: 12px; color: var(--muted); }
  .btn-primary {
    padding: 12px 32px; border: none; border-radius: 14px; font-size: 15px;
    font-weight: 600; font-family: var(--font-body); cursor: pointer;
    background: var(--accent); color: #fff;
    transition: background 0.2s, transform 0.15s, box-shadow 0.15s;
  }
  .btn-primary:hover {
    background: oklch(58% 0.13 28); transform: translateY(-1px);
    box-shadow: 0 4px 16px oklch(64% 0.13 28 / 25%);
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  .examples { margin-top: 40px; width: 100%; }
  .examples-label {
    font-size: 13px; color: var(--muted); text-align: center;
    margin-bottom: 14px; letter-spacing: 0.02em;
  }
  .examples-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
  .example-chip {
    padding: 10px 18px; border: 1px solid var(--border); border-radius: 100px;
    font-size: 14px; color: var(--muted); cursor: pointer;
    background: var(--surface); transition: border-color 0.2s, color 0.2s, background 0.2s;
    font-family: var(--font-body);
  }
  .example-chip:hover { border-color: var(--accent); color: var(--accent); background: oklch(95% 0.03 45); }

  .toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 500;
    z-index: 200; opacity: 0; transition: opacity 0.3s;
  }
  .toast.show { opacity: 1; }
  .toast.error { background: oklch(94% 0.03 20); color: oklch(42% 0.15 20); }
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-brand">Talk<span>2</span>Code</a>
  <div class="nav-links">
    <a href="history.html" class="nav-link">历史对话</a>
    <a href="settings.html" class="nav-link">设置</a>
  </div>
  <div class="nav-user">
    <span class="nav-username" id="navUsername">用户</span>
    <span class="nav-avatar" id="navAvatar">U</span>
    <button class="btn-logout" onclick="logout()">退出</button>
  </div>
</nav>

<main class="main">
  <div class="hero">
    <h1>用自然语言<mark>创造</mark>应用</h1>
    <p>描述你想要的应用，AI 将实时生成完整的前端代码，支持预览和持续迭代优化。</p>
  </div>

  <div class="input-card">
    <textarea id="requirementInput" placeholder="描述你的需求，例如：开发一个待办清单应用，支持添加、删除、标记完成，界面简洁美观…"></textarea>
    <div class="actions">
      <span class="hint">Ctrl + Enter 快速提交</span>
      <button class="btn-primary" id="submitBtn" disabled>生成代码</button>
    </div>
  </div>

  <div class="examples">
    <p class="examples-label">试试这样描述</p>
    <div class="examples-row">
      <span class="example-chip">开发一个待办清单应用，支持增删改查</span>
      <span class="example-chip">做一个计算器应用，界面精美</span>
      <span class="example-chip">创建一个笔记应用，支持分类和搜索</span>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const API_BASE = window.location.origin;
const token = localStorage.getItem('token');
if (!token) { window.location.href = 'login.html'; }

try {
  const payload = JSON.parse(atob(token.split('.')[1]));
  document.getElementById('navUsername').textContent = payload.sub || '用户';
  document.getElementById('navAvatar').textContent = (payload.sub || 'U')[0].toUpperCase();
} catch(e) {}

function logout() {
  localStorage.removeItem('token');
  window.location.href = 'login.html';
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

const textarea = document.getElementById('requirementInput');
const btn = document.getElementById('submitBtn');
textarea.addEventListener('input', () => {
  btn.disabled = textarea.value.trim().length === 0;
});

document.querySelectorAll('.example-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    textarea.value = chip.textContent;
    btn.disabled = false;
    textarea.focus();
  });
});

document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    if (!btn.disabled) btn.click();
  }
});

btn.addEventListener('click', async () => {
  const content = textarea.value.trim();
  if (!content) return;

  btn.disabled = true;
  btn.textContent = '提交中…';

  try {
    const resp = await fetch(API_BASE + '/api/requirements', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ content })
    });
    const data = await resp.json();
    if (!resp.ok) {
      showToast(data.error || '创建失败', 'error');
      btn.disabled = false;
      btn.textContent = '生成代码';
      return;
    }
    const reqId = data.requirement ? data.requirement.id : data.requirement_id;window.location.href = 'detail.html?id=' + reqId;
  } catch (err) {
    showToast('网络错误，请稍后重试', 'error');
    btn.disabled = false;
    btn.textContent = '生成代码';
  }
});
</script>
</body>
</html>
