<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>历史对话 — Talk2Code</title>
<script src="js/security.js"></script>
<style>
  :root {
    --bg:      oklch(97% 0.018 70);
    --surface: oklch(99% 0.008 70);
    --fg:      oklch(22% 0.02 50);
    --muted:   oklch(50% 0.018 50);
    --border:  oklch(90% 0.014 70);
    --accent:  oklch(64% 0.13 28);
    --accent-soft: oklch(88% 0.04 38);
    --font-display: 'Tiempos Headline', 'Newsreader', 'Iowan Old Style', Georgia, serif;
    --font-body: 'Söhne', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column;
  }
  .nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
    background: oklch(99% 0.008 70 / 85%);
  }
  .nav-brand {
    font-family: var(--font-display); font-size: 22px; font-weight: 600;
    color: var(--fg); text-decoration: none; letter-spacing: -0.01em;
  }
  .nav-brand span { color: var(--accent); }
  .nav-links { display: flex; align-items: center; gap: 8px; }
  .nav-link {
    padding: 8px 16px; border-radius: 10px; font-size: 14px; font-weight: 500;
    color: var(--muted); text-decoration: none; transition: color 0.15s, background 0.15s;
  }
  .nav-link:hover { color: var(--fg); background: var(--bg); }
  .nav-link.active { color: var(--accent); }
  .nav-user { display: flex; align-items: center; gap: 12px; }
  .nav-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--accent-soft); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
  }
  .nav-username { font-size: 14px; color: var(--fg); font-weight: 500; }
  .main {
    flex: 1; max-width: 880px; margin: 0 auto; padding: 48px 24px; width: 100%;
  }
  .page-header {
    display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px;
  }
  .page-header h1 {
    font-family: var(--font-display);
    font-size: clamp(28px, 4vw, 40px); font-weight: 600;
    color: var(--fg); letter-spacing: -0.02em;
  }
  .page-header .count { font-size: 14px; color: var(--muted); }
  .search-bar { margin-bottom: 28px; }
  .search-bar input {
    width: 100%; padding: 12px 16px; border: 1px solid var(--border);
    border-radius: 14px; font-size: 15px; font-family: var(--font-body);
    color: var(--fg); background: var(--surface); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-bar input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px oklch(64% 0.13 28 / 10%); }
  .search-bar input::placeholder { color: oklch(65% 0.01 70); }
  .list { display: flex; flex-direction: column; gap: 12px; }
  .item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px; cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
    display: flex; justify-content: space-between; align-items: center; gap: 20px;
  }
  .item:hover { border-color: oklch(85% 0.04 45); box-shadow: 0 2px 12px oklch(0 0 0 / 4%); }
  .item-body { flex: 1; min-width: 0; }
  .item-body h3 {
    font-size: 16px; font-weight: 600; color: var(--fg);
    margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .item-body .excerpt {
    font-size: 13px; color: var(--muted); line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .item-body .meta { font-size: 12px; color: var(--muted); margin-top: 8px; display: flex; gap: 16px; }
  .item-status {
    flex-shrink: 0; padding: 6px 14px; border-radius: 100px;
    font-size: 12px; font-weight: 500; letter-spacing: 0.01em;
  }
  .status-finished  { background: oklch(93% 0.05 155); color: oklch(38% 0.1 155); }
  .status-processing { background: oklch(93% 0.03 250); color: oklch(38% 0.1 250); }
  .status-pending    { background: oklch(95% 0.04 85); color: oklch(42% 0.1 75); }
  .status-failed     { background: oklch(94% 0.03 20); color: oklch(42% 0.15 20); }

  .empty {
    text-align: center; padding: 80px 24px;
  }
  .empty-icon {
    width: 80px; height: 80px; margin: 0 auto 24px; border-radius: 20px;
    background: var(--accent-soft); display: flex; align-items: center; justify-content: center;
    font-size: 32px; color: var(--accent);
  }
  .empty h2 { font-family: var(--font-display); font-size: 24px; font-weight: 600; margin-bottom: 8px; }
  .empty p { font-size: 14px; color: var(--muted); max-width: 300px; margin: 0 auto; }
  .empty .btn-primary {
    display: inline-block; margin-top: 24px; padding: 12px 28px; border: none;
    border-radius: 14px; font-size: 15px; font-weight: 600; font-family: var(--font-body);
    cursor: pointer; background: var(--accent); color: #fff; text-decoration: none;
    transition: background 0.2s, transform 0.15s, box-shadow 0.15s;
  }
  .empty .btn-primary:hover {
    background: oklch(58% 0.13 28); transform: translateY(-1px);
    box-shadow: 0 4px 16px oklch(64% 0.13 28 / 25%);
  }
  .btn-logout {
    padding: 8px 16px; border-radius: 10px; font-size: 14px; font-weight: 500;
    color: var(--muted); cursor: pointer; border: none; background: none;
    font-family: var(--font-body); transition: color 0.15s;
  }
  .btn-logout:hover { color: oklch(42% 0.15 20); }
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-brand">Talk<span>2</span>Code</a>
  <div class="nav-links">
    <a href="history.html" class="nav-link active">历史对话</a>
    <a href="settings.html" class="nav-link">设置</a>
  </div>
  <div class="nav-user">
    <span class="nav-username" id="navUsername">用户</span>
    <span class="nav-avatar" id="navAvatar">U</span>
    <button class="btn-logout" onclick="logout()">退出</button>
  </div>
</nav>

<main class="main">
  <div class="page-header">
    <h1>历史对话</h1>
    <span class="count" id="projectCount"></span>
  </div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="搜索历史项目…">
  </div>

  <div class="list" id="projectList"></div>

  <div class="empty" id="emptyState" style="display:none">
    <div class="empty-icon">&#9998;</div>
    <h2>还没有项目</h2>
    <p>创建你的第一个项目，开始用自然语言生成应用</p>
    <a href="index.html" class="btn-primary">开始创建</a>
  </div>
</main>

<script>
const API_BASE = window.location.origin;
const token = localStorage.getItem('token');
if (!token) { window.location.href = 'login.html'; }

// 解析 JWT 获取用户名
try {
  const payload = JSON.parse(atob(token.split('.')[1]));
  document.getElementById('navUsername').textContent = payload.sub || '用户';
  document.getElementById('navAvatar').textContent = (payload.sub || 'U')[0].toUpperCase();
} catch(e) {}

function logout() {
  localStorage.removeItem('token');
  window.location.href = 'login.html';
}

function statusLabel(s) {
  const map = { pending: '排队中', processing: '生成中', finished: '已完成', failed: '失败' };
  return map[s] || s;
}
function statusClass(s) {
  const map = { finished: 'status-finished', processing: 'status-processing', pending: 'status-pending', failed: 'status-failed' };
  return map[s] || '';
}

async function loadProjects() {
  try {
    const resp = await fetch(API_BASE + '/api/requirements', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!resp.ok) throw new Error('Failed');
    const data = await resp.json();
    const list = document.getElementById('projectList');
    const empty = document.getElementById('emptyState');
    const count = document.getElementById('projectCount');

    const projects = data.requirements || [];
    count.textContent = '共 ' + projects.length + ' 个项目';

    if (projects.length === 0) {
      list.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    list.innerHTML = projects.map(p => `
      <div class="item" onclick="if(${p.id})window.location.href='detail.html?id=${p.id}'">
        <div class="item-body">
          <h3>${SecurityUtils.escapeHtml(p.title || '未命名')}</h3>
          <p class="excerpt">${SecurityUtils.escapeHtml((p.content || '').substring(0, 100))}</p>
          <div class="meta">
            <span>${new Date(p.create_time).toLocaleDateString('zh-CN')}</span>
            <span>${p.file_count || 0} 个文件</span>
          </div>
        </div>
        <span class="item-status ${statusClass(p.status)}">${statusLabel(p.status)}</span>
      </div>
    `).join('');
  } catch(err) {
    console.error('Failed to load projects:', err);
  }
}

document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  document.querySelectorAll('#projectList .item').forEach(item => {
    const title = item.querySelector('h3').textContent.toLowerCase();
    item.style.display = title.includes(q) ? '' : 'none';
  });
});

loadProjects();
</script>
</body>
</html>
